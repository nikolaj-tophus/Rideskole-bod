<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan vare</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

video{
width:100%;
max-width:400px;
border:3px solid #333;
border-radius:10px;
}

button{
margin-top:20px;
padding:15px;
font-size:18px;
}
</style>
</head>

<body>

<h2>🐎 Scan varen</h2>
<p>Hold kameraet over stregkoden</p>

<video id="video"></video>

<p id="result"></p>

<script>

const codeReader = new ZXing.BrowserBarcodeReader()
const videoElement = document.getElementById('video')

codeReader.decodeFromVideoDevice(null, videoElement, (result, err) => {

if(result){

let code = result.text
document.getElementById("result").innerHTML =
"Stregkode: " + code

// eksempel på vare mapping
let prices = {
"57095967":20,
"5709876543210":15
}

if(prices[code]){

let amount = prices[code]

window.location.href =
`mobilepay://send?phone=12345678&amount=${amount}`

}

}

})

</script>

</body>
</html>

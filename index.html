<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rideskole Snackbod</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
transition:background 0.3s;
}

video{
width:100%;
max-width:400px;
border-radius:12px;
border:3px solid #333;
}

#cart{
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
border-bottom:1px solid #eee;
}

button{
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
margin-top:10px;
}

.remove{
background:#e74c3c;
color:white;
padding:6px 10px;
font-size:14px;
}

.pay{
background:#27ae60;
color:white;
width:100%;
}

.clear{
background:#c0392b;
color:white;
width:100%;
}

/* blink farver */

.flash-green{
background:#2ecc71 !important;
}

.flash-red{
background:#e74c3c !important;
}

</style>
</head>

<body>

<h2>🐎 Rideskole Snackbod</h2>
<p>Scan dine varer</p>

<video id="video"></video>

<div id="cart">

<h3>Indkøb</h3>

<div id="items"></div>

<h2>Total: <span id="total">0</span> kr</h2>

<button class="pay" onclick="pay()">Betal</button>
<button class="clear" onclick="clearCart()">Tøm kurv</button>

</div>

<script>

const codeReader = new ZXing.BrowserBarcodeReader()

let lastCode=""
let lastScanTime=0

let cart={}
let total=0

// PRODUKTER

let products={

"5701234567890":{name:"Sodavand",price:20},
"5709876543210":{name:"Chips",price:15},
"5701111111111":{name:"Müslibar",price:10},
"5702222222222":{name:"Slikpose",price:10}

}

// START SCANNER

codeReader.decodeFromVideoDevice(null,'video',(result,err)=>{

if(result){

let code=result.text
let now=Date.now()

if(code===lastCode && now-lastScanTime<2000){
return
}

lastCode=code
lastScanTime=now

if(products[code]){
addProduct(code)
flashGreen()
vibrate()
}else{
flashRed()
vibrate()
}

}

})

// LÆG VARE I KURV

function addProduct(code){

let product=products[code]

if(!cart[code]){
cart[code]={...product,qty:1}
}else{
cart[code].qty++
}

total+=product.price

updateCart()

}

// FJERN VARE

function removeProduct(code){

let item=cart[code]

if(item.qty>1){

item.qty--
total-=item.price

}else{

total-=item.price
delete cart[code]

}

updateCart()

}

// OPDATER KURV

function updateCart(){

let container=document.getElementById("items")
container.innerHTML=""

for(let code in cart){

let item=cart[code]

let div=document.createElement("div")
div.className="item"

div.innerHTML=`
<span>${item.name} x${item.qty}</span>
<span>${item.price*item.qty} kr</span>
<button class="remove" onclick="removeProduct('${code}')">−</button>
`

container.appendChild(div)

}

document.getElementById("total").innerText=total

}

// BETAL

function pay(){

if(total===0){
alert("Ingen varer scannet")
return
}

alert("Betal "+total+" kr til MobilePay\n\n60651909")

}

// TØM KURV

function clearCart(){

cart={}
total=0
updateCart()

}

// GRØN BLINK

function flashGreen(){

document.body.classList.add("flash-green")

setTimeout(()=>{
document.body.classList.remove("flash-green")
},300)

}

// RØD BLINK

function flashRed(){

document.body.classList.add("flash-red")

setTimeout(()=>{
document.body.classList.remove("flash-red")
},300)

}

// VIBRATION

function vibrate(){

if(navigator.vibrate){
navigator.vibrate(200)
}

}

</script>

</body>
</html>

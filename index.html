<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rideskole Snackbod</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
margin:0;
padding:20px;
}

h2{
margin-bottom:10px;
}

video{
width:100%;
max-width:420px;
border-radius:12px;
border:3px solid #333;
}

#cart{
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

ul{
list-style:none;
padding:0;
}

li{
padding:8px;
border-bottom:1px solid #eee;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:10px;
width:100%;
}

.pay{
background:#4CAF50;
color:white;
}

.clear{
background:#ff5252;
color:white;
}

</style>
</head>

<body>

<h2>🐎 Rideskole Snackbod</h2>
<p>Scan dine varer</p>

<video id="video"></video>

<div id="cart">

<h3>Indkøb</h3>

<ul id="items"></ul>

<h3>Total: <span id="total">0</span> kr</h3>

<button class="pay" onclick="pay()">Betal med MobilePay</button>

<button class="clear" onclick="clearCart()">Tøm kurv</button>

</div>

<script>

const codeReader = new ZXing.BrowserBarcodeReader()

const video = document.getElementById("video")

let cart=[]
let total=0

// vare database
let products={

"57095967":{name:"Sodavand",price:20},
"7040280012570":{name:"Chips",price:15},
"570830008411":{name:"Müslibar",price:10},
"7310350133840":{name:"Slikpose",price:10}

}

codeReader.decodeFromVideoDevice(null,video,(result,err)=>{

if(result){

let code=result.text

if(products[code]){

addProduct(products[code])

}

}

})

function addProduct(product){

cart.push(product)

total+=product.price

updateCart()

}

function updateCart(){

let list=document.getElementById("items")

list.innerHTML=""

cart.forEach(p=>{

let li=document.createElement("li")

li.innerText=p.name+" - "+p.price+" kr"

list.appendChild(li)

})

document.getElementById("total").innerText=total

}

function pay(){

let phone="60651909"

if(total===0){
alert("Du har ikke scannet nogen varer")
return
}

window.location.href=`mobilepay://send?phone=${phone}&amount=${total}`

}

function clearCart(){

cart=[]
total=0
updateCart()

}

</script>

</body>
</html>
